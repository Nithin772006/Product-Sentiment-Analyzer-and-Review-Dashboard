services:
  - type: web
    name: sentiment-analyzer-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: MONGODB_URI
        sync: false # User must provide this in the Render dashboard
      - key: ALLOWED_ORIGINS
        value: "https://your-vercel-frontend.vercel.app,http://localhost:5173"
